<head>
  <meta charset="UTF-8" />

  <title>Haitang | Ops & AI Engineer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            cyber: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              200: '#99f6e4',
              300: '#5eead4',
              400: '#2dd4bf',
              500: '#14b8a6',
              600: '#0d9488',
              700: '#0f766e',
              800: '#115e59',
              900: '#134e4a',
              950: '#042f2e',
            },
            neon: {
              purple: '#b026ff',
              green: '#00ff41',
              cyan: '#00f3ff',
            }
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 6s ease-in-out infinite',
            'spin-slow': 'spin 12s linear infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          }
        },
      },
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;600;800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #020617;
      color: #e2e8f0;
      cursor: default;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 3D Text Flip Effect */
    .flip-char {
      display: inline-block;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .flip-char:hover {
      transform: rotateY(360deg) scale(1.2);
      color: #00f3ff;
      text-shadow: 0 0 8px rgba(0, 243, 255, 0.6);
    }

    /* Glitch Text Effect */
    .glitch-wrapper {
      position: relative;
    }

    .glitch-wrapper::before,
    .glitch-wrapper::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
    }

    .glitch-wrapper:hover::before {
      color: #ff00ff;
      z-index: -1;
      animation: glitch-anim-1 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
      opacity: 1;
    }

    .glitch-wrapper:hover::after {
      color: #00ffff;
      z-index: -2;
      animation: glitch-anim-2 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
      opacity: 1;
    }

    @keyframes glitch-anim-1 {
      0% {
        transform: translate(0)
      }

      20% {
        transform: translate(-2px, 2px)
      }

      40% {
        transform: translate(-2px, -2px)
      }

      60% {
        transform: translate(2px, 2px)
      }

      80% {
        transform: translate(2px, -2px)
      }

      100% {
        transform: translate(0)
      }
    }

    @keyframes glitch-anim-2 {
      0% {
        transform: translate(0)
      }

      20% {
        transform: translate(2px, -2px)
      }

      40% {
        transform: translate(2px, 2px)
      }

      60% {
        transform: translate(-2px, -2px)
      }

      80% {
        transform: translate(-2px, 2px)
      }

      100% {
        transform: translate(0)
      }
    }

    @keyframes slideProgress {
      0% {
        width: 0%;
      }

      100% {
        width: 100%;
      }
    }

    /* Quote Animation */
    @keyframes flyOut {
      0% {
        transform: translateY(0);
        opacity: 1;
        filter: blur(0);
      }

      100% {
        transform: translateY(-40px);
        opacity: 0;
        filter: blur(10px);
      }
    }

    @keyframes flyIn {
      0% {
        transform: translateY(40px);
        opacity: 0;
        filter: blur(10px);
      }

      100% {
        transform: translateY(0);
        opacity: 1;
        filter: blur(0);
      }
    }

    .animate-fly-out {
      animation: flyOut 0.8s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    .animate-fly-in {
      animation: flyIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
  </style>
