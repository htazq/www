$:
  vscode:
    - docker:
        image: docker.cnb.cool/htazq/image/node-22:latest
      services:
        - vscode
        - docker
      stages:
        - node -v
        - npm install

main:
  push:
    - imports: https://cnb.cool/htazq/my-secrets/-/blob/main/envs.yml
      stages:
        - name: Sync to GitHub
          image: alpine/git
          script: |
            if [ -z "$GITHUB_TOKEN" ]; then echo "Error: GITHUB_TOKEN is empty"; exit 1; fi
            git config --global user.email "61930738+htazq@users.noreply.github.com"
            git config --global user.name "htazq"
            git remote add github https://oauth2:$GITHUB_TOKEN@github.com/htazq/www.git
            git push --force github HEAD:main

        - name: Build Site and Experiments
          image: node:22
          script: |
            npm install
            npm run build
            corepack enable
            cd gpt-at9-internet-experiments
            pnpm install --frozen-lockfile
            pnpm lint
            pnpm test
            pnpm build
            cd ..
            mkdir -p dist/experiments
            cp -R gpt-at9-internet-experiments/dist/. dist/experiments/

        - name: Deploy to EdgeOne Pages
          image: node:22
          script: |
            npx edgeone makers deploy ./dist -n cnb-www -t $EDGEONE_API_TOKEN

  # 低频兜底发布，避免代码推送恰好遇到 EdgeOne 当日额度耗尽。
  "crontab: 10 0 * * *":
    - imports: https://cnb.cool/htazq/my-secrets/-/blob/main/envs.yml
      stages:
        - name: Daily EdgeOne Deploy
          image: node:22
          script: |
            npm install
            npm run build
            corepack enable
            cd gpt-at9-internet-experiments
            pnpm install --frozen-lockfile
            pnpm build
            cd ..
            mkdir -p dist/experiments
            cp -R gpt-at9-internet-experiments/dist/. dist/experiments/
            npx edgeone makers deploy ./dist -n cnb-www -t $EDGEONE_API_TOKEN
