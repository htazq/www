$:
  vscode:
    - docker:
        image: docker.cnb.cool/htazq/image/node-22:latest
      services:
        - vscode
        - docker
      stages:
        - node -v
        - npm install

main:
  push:
    - imports: https://cnb.cool/htazq/my-secrets/-/blob/main/envs.yml
      stages:
        - name: Sync to GitHub
          image: alpine/git
          script: |
            if [ -z "$GITHUB_TOKEN" ]; then echo "Error: GITHUB_TOKEN is empty"; exit 1; fi
            git config --global user.email "61930738+htazq@users.noreply.github.com"
            git config --global user.name "htazq"
            git remote add github https://oauth2:$GITHUB_TOKEN@github.com/htazq/www.git
            git push --force github HEAD:main

        - name: Build Dashboard and Experiments
          image: node:22
          env:
            GITHUB_TOKEN: $GITHUB_TOKEN
            CNB_TOKEN: $CNB_TOKEN
            GH_OWNER: htazq
          script: |
            npm install
            node scripts/local-dashboard-build.mjs
            npm run validate
            npm run build
            corepack enable
            cd gpt-at9-internet-experiments
            pnpm install --frozen-lockfile
            pnpm lint
            pnpm test
            pnpm build
            cd ..
            mkdir -p dist/experiments
            cp -R gpt-at9-internet-experiments/dist/. dist/experiments/

        - name: Deploy to EdgeOne Pages
          image: node:22
          script: |
            npx edgeone pages deploy ./dist -n cnb-www -t $EDGEONE_API_TOKEN

  # 每 5 分钟重新抓取 GitHub/CNB 数据，并把主站与实验站一起部署到 www.at9.net。
  "crontab: */5 * * * *":
    - imports: https://cnb.cool/htazq/my-secrets/-/blob/main/envs.yml
      stages:
        - name: Scheduled Build and Deploy
          image: node:22
          env:
            GITHUB_TOKEN: $GITHUB_TOKEN
            CNB_TOKEN: $CNB_TOKEN
            GH_OWNER: htazq
          script: |
            npm install
            node scripts/local-dashboard-build.mjs
            npm run validate
            npm run build
            corepack enable
            cd gpt-at9-internet-experiments
            pnpm install --frozen-lockfile
            pnpm build
            cd ..
            mkdir -p dist/experiments
            cp -R gpt-at9-internet-experiments/dist/. dist/experiments/
            npx edgeone pages deploy ./dist -n cnb-www -t $EDGEONE_API_TOKEN
