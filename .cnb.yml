$:
  vscode:
    - docker:
        image: docker.cnb.cool/htazq/image/node-22:latest
      services:
        - vscode
        - docker
      stages:
        - node -v
        - npm install

main:
  push:
    - imports: https://cnb.cool/htazq/my-secrets/-/blob/main/envs.yml
      stages:
        - name: Sync to GitHub
          image: alpine/git
          script: |
            if [ -z "$GITHUB_TOKEN" ]; then echo "Error: GITHUB_TOKEN is empty"; exit 1; fi
            git config --global user.email "61930738+htazq@users.noreply.github.com"
            git config --global user.name "htazq"
            git remote add github https://oauth2:$GITHUB_TOKEN@github.com/htazq/www.git
            git push --force github HEAD:main

        - name: Build Dashboard and Experiments
          image: node:22
          env:
            GH_OWNER: htazq
          script: |
            npm install
            node scripts/local-dashboard-build.mjs
            npm run validate
            npm run build
            corepack enable
            cd gpt-at9-internet-experiments
            pnpm install --frozen-lockfile
            pnpm lint
            pnpm test
            pnpm build
            cd ..
            mkdir -p dist/experiments
            cp -R gpt-at9-internet-experiments/dist/. dist/experiments/

        - name: Deploy to EdgeOne Pages
          image: node:22
          script: |
            npx edgeone makers deploy ./dist -n cnb-www -t $EDGEONE_API_TOKEN

  # 每 5 分钟只刷新数据分支，不消耗 EdgeOne 构建额度。
  "crontab: */5 * * * *":
    - imports: https://cnb.cool/htazq/my-secrets/-/blob/main/envs.yml
      stages:
        - name: Refresh Dashboard Feed
          image: node:22
          env:
            GH_OWNER: htazq
          script: |
            node scripts/local-dashboard-build.mjs
            npm run validate
            node --input-type=module <<'NODE'
            const repository = 'at9-dashboard-feed';
            const headers = {
              Accept: 'application/vnd.github+json',
              Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
              'Content-Type': 'application/json',
              'X-GitHub-Api-Version': '2022-11-28',
            };
            let response = await fetch(`https://api.github.com/repos/htazq/${repository}`, {headers});
            if (response.status === 404) {
              response = await fetch('https://api.github.com/user/repos', {
                method: 'POST',
                headers,
                body: JSON.stringify({
                  name: repository,
                  description: 'Public data feed for www.at9.net',
                  private: false,
                }),
              });
            }
            if (!response.ok) throw new Error(`Data repository request failed: ${response.status} ${await response.text()}`);
            const data = await response.json();
            if (data.private) throw new Error('Data repository must be public');
            NODE
            workdir="$(mktemp -d)"
            cp public/data/dashboard-feed.json "$workdir/dashboard-feed.json"
            cd "$workdir"
            git init
            git checkout -b main
            git config user.email "61930738+htazq@users.noreply.github.com"
            git config user.name "htazq"
            git add dashboard-feed.json
            git commit -m "data: refresh dashboard feed"
            git push --force "https://oauth2:$GITHUB_TOKEN@github.com/htazq/at9-dashboard-feed.git" HEAD:main

  # 低频兜底发布，避免代码推送恰好遇到 EdgeOne 当日额度耗尽。
  "crontab: 10 0 * * *":
    - imports: https://cnb.cool/htazq/my-secrets/-/blob/main/envs.yml
      stages:
        - name: Daily EdgeOne Deploy
          image: node:22
          script: |
            npm install
            npm run build
            corepack enable
            cd gpt-at9-internet-experiments
            pnpm install --frozen-lockfile
            pnpm build
            cd ..
            mkdir -p dist/experiments
            cp -R gpt-at9-internet-experiments/dist/. dist/experiments/
            npx edgeone makers deploy ./dist -n cnb-www -t $EDGEONE_API_TOKEN
