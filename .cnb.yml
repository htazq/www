$:
  vscode:
    - docker:
        image: docker.cnb.cool/anyexyz/examples/nodejs:latest
        script: |
          npm install 
          npm run dev
      services:
        - vscode
        - docker

# 触发器：推送到主分支
main:
  push:
    # 从私有仓库导入环境变量
    - imports: https://cnb.cool/htazq/my-secrets/-/blob/main/envs.yml
      stages:
        # 构建当前项目
        - name: Build Current Project
          image: node:20
          script: |
            node -v
            npm install
            npm run build

        # 将构建输出部署到 EdgeOne Pages
        - name: Deploy to EdgeOne Pages
          image: node:20
          script: |
            # 使用 npx 运行 edgeone 命令
            npx edgeone pages deploy ./dist -n cnb-www -t $EDGEONE_API_TOKEN 
